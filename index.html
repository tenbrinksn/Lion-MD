<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lion MD | Virtual Healthcare Staffing</title>
    <style>
        :root {
            --header-blue: #0056b3; 
            --white: #ffffff;
            --lion-black: #000000;
            --button-contact: #28a745;
        }

        body, html {
            margin: 0;
            padding: 0;
            min-height: 100%;
            font-family: 'Georgia', Times, serif;
            /* Background changed to solid white */
            background-color: var(--white);
            color: var(--lion-black);
        }

        /* Full Width Blue Header */
        .top-header {
            width: 100%;
            background-color: var(--header-blue);
            padding: 15px 0;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .header-title {
            color: var(--white);
            margin: 0;
            font-size: 1.2rem;
            letter-spacing: 1px;
            font-weight: normal;
        }

        /* Main Content Container */
        main {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 80px 20px;
        }

        /* Logo - 500px wide and Centered */
        .central-logo {
            width: 500px; 
            max-width: 90%; 
            height: auto;
            margin-bottom: 30px;
        }

        /* Company Name - 8rem */
        .huge-title {
            font-size: 8rem; 
            font-weight: bold;
            margin: 0;
            color: var(--lion-black);
            line-height: 1;
        }

        /* Tagline - 3.2rem */
        .huge-tagline {
            font-size: 3.2rem;
            font-weight: normal;
            margin-top: 20px;
            margin-bottom: 50px;
            color: var(--lion-black);
            max-width: 1200px;
        }

        /* Buttons Area */
        .btn-container {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 40px;
        }

        .btn {
            padding: 20px 45px;
            font-size: 1.4rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            transition: transform 0.2s ease;
            font-family: 'Georgia', serif;
        }

        .btn:hover {
            transform: scale(1.05);
        }

        .btn-login {
            background-color: var(--lion-black);
            color: var(--white);
        }

        .btn-contact {
            background-color: var(--button-contact);
            color: var(--white);
        }

        /* Login Box */
        #login-form {
            display: none;
            margin-top: 20px;
            background: #f9f9f9; /* Subtle grey to distinguish from white background */
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }

        #login-form input {
            width: 90%;
            padding: 15px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1rem;
        }

        /* Mobile Adjustments */
        @media (max-width: 900px) {
            .huge-title {
                font-size: 4rem;
            }
            .huge-tagline {
                font-size: 1.8rem;
            }
            .central-logo {
                width: 300px;
            }
            .btn-container {
                flex-direction: column;
                width: 100%;
            }
            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <header class="top-header">
        <h2 class="header-title">Lion MD</h2>
    </header>

    <main>
        <img src="lion.jpg" alt="Lion MD" class="central-logo">

        <h1 class="huge-title">Lion MD</h1>
        <p class="huge-tagline">Premier Virtual Healthcare Staffing Solutions</p>

        <div class="btn-container">
            <button class="btn btn-login" onclick="toggleLogin()">Provider Login</button>
            <a href="mailto:contact@lion.md" class="btn btn-contact">Contact Us</a>
        </div>

        <div id="login-form">
            <h2 style="margin-top:0;">Provider Portal</h2>
            <input type="text" placeholder="Username">
            <input type="password" placeholder="Password">
            <button class="btn btn-login" style="width: 100%;">Enter</button>
        </div>
    </main>

    <script>
        function toggleLogin() {
            var form = document.getElementById("login-form");
            if (form.style.display === "block") {
                form.style.display = "none";
            } else {
                form.style.display = "block";
                setTimeout(() => {
                    form.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }, 100);
            }
        }
    </script>

</body>
</html>
