<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lion MD | Virtual Healthcare Staffing</title>
    <style>
        /* CSS Variables - Defined by the Logo/Medical look */
        :root {
            --medical-blue: #e6f2ff; /* Light medical blue gradient center */
            --white: #ffffff;
            --lion-black: #000000;  /* The color from your logo */
            --button-contact: #28a745;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            /* Setting the primary font family to Georgia, Serif */
            font-family: 'Georgia', Times, serif;
            /* Gradient: White at top/bottom, Medical Blue in center */
            background: linear-gradient(to bottom, var(--white) 0%, var(--medical-blue) 50%, var(--white) 100%);
            background-attachment: fixed;
            color: var(--lion-black);
            -webkit-font-smoothing: antialiased; /* Sharper rendering for Serif fonts */
        }

        /* Top Left Header Section */
        header {
            padding: 30px; /* Increased padding */
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .logo {
            width: 250px; /* Large badge size */
            height: auto;
            margin-bottom: 10px;
        }

        /* Standard header font, matched to logo color */
        .company-name-header {
            font-size: 1.8rem;
            color: var(--lion-black);
            margin: 0;
            font-weight: normal; /* Just a standard label in the header */
        }

        /* Main Content Area (Center) */
        main {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 60px 20px;
            min-height: 50vh;
        }

        /* The main company name (Middle of the page) */
        h1.main-title {
            font-size: 4rem; /* Significantly larger */
            font-weight: bold; /* Must be BOLD per request */
            margin-bottom: 15px;
            color: var(--lion-black);
        }

        /* The statement line below the name (Middle of the page) */
        p.main-tagline {
            font-size: 1.6rem; /* Large, but smaller than the name */
            font-weight: normal; /* NOT bolded per request */
            margin-bottom: 40px;
            color: var(--lion-black);
            max-width: 800px;
            line-height: 1.4;
        }

        /* Buttons and Form (Same functionality, updated style) */
        .btn-container {
            display: flex;
            gap: 25px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 30px;
        }

        .btn {
            padding: 15px 35px;
            font-size: 1.1rem;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            transition: opacity 0.3s ease;
            font-family: 'Georgia', serif; /* Buttons also use Serif */
        }

        .btn:hover {
            opacity: 0.9;
        }

        .btn-login {
            background-color: var(--lion-black); /* Matching the Logo color */
            color: white;
        }

        .btn-contact {
            background-color: var(--button-contact);
            color: white;
        }

        /* Hidden Login Form */
        #login-form {
            display: none;
            margin-top: 20px;
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 350px;
        }

        #login-form input {
            width: 90%;
            padding: 12px;
            margin: 12px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-family: 'Georgia', serif;
        }

        /* Mobile Stacking Logic */
        @media (max-width: 768px) {
            h1.main-title {
                font-size: 2.5rem;
            }
            p.main-tagline {
                font-size: 1.3rem;
            }
            .logo {
                width: 180px; /* Slightly smaller badge on mobile */
            }
            .btn-container {
                flex-direction: column;
                width: 100%;
                gap: 15px;
            }
            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <header>
        <img src="lion.jpg" alt="Lion MD Logo" class="logo">
    </header>

    <main>
        <h1 class="main-title">Lion MD</h1>
        
        <p class="main-tagline">Premier Virtual Healthcare Staffing Solutions</p>

        <div class="btn-container">
            <button class="btn btn-login" onclick="toggleLogin()">Provider Login</button>
            <a href="mailto:contact@lion.md" class="btn btn-contact">Contact Us</a>
        </div>

        <div id="login-form">
            <h3 style="margin-top: 0; color: #000;">Secure Portal</h3>
            <input type="text" placeholder="Username">
            <input type="password" placeholder="Password">
            <button class="btn btn-login" style="width: 100%;">Enter</button>
        </div>
    </main>

    <script>
        // Toggles the login form visibility
        function toggleLogin() {
            var form = document.getElementById("login-form");
            if (form.style.display === "block") {
                form.style.display = "none";
            } else {
                form.style.display = "block";
                // Scrolls to the form on mobile when opened
                setTimeout(function() {
                    form.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }, 100);
            }
        }
    </script>

</body>
</html>
